<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>reTerminal bus dashboard</title>
  <style>
    :root { --bg:#f4f4f4; --fg:#111; --line:#111; --muted:#666; --white:#fff; --soft:#d8d8d8; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #ddd;
      font-family: Arial, "Noto Sans TC", sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      color: var(--fg);
    }
    .frame {
      width: 800px;
      height: 380px;
      background: var(--bg);
      border: 8px solid #fff;
      box-shadow: 0 8px 30px rgba(0,0,0,.15);
      padding: 18px;
    }
    .dash {
      display: grid;
      grid-template-columns: 1.65fr .95fr;
      gap: 18px;
      height: 100%;
    }
    .bus-panel {
      display: grid;
      grid-template-rows: repeat(7, 1fr);
      border-top: 2px solid var(--line);
      border-bottom: 2px solid var(--line);
    }
    .row {
      display: grid;
      grid-template-columns: 94px 1fr 1fr 1fr;
      align-items: center;
      min-height: 0;
      border-bottom: 1px solid var(--line);
    }
    .row:last-child { border-bottom: 0; }
    .route {
      background: #111;
      color: #fff;
      font-weight: 700;
      font-size: 24px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: .3px;
    }
    .eta {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      border-left: 1px solid var(--line);
      overflow: hidden;
      white-space: nowrap;
    }
    .eta.na { color: var(--muted); }
    .side {
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
    }
    .date-box {
      text-align: center;
      padding-top: 2px;
    }
    .date {
      font-size: 72px;
      line-height: .95;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .weekday {
      display: inline-block;
      background: #111;
      color: #fff;
      padding: 6px 24px;
      font-size: 28px;
      line-height: 1;
      margin-top: 6px;
      font-weight: 700;
    }
    .clock {
      text-align: center;
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
      padding: 6px 0 10px;
      border-bottom: 2px solid var(--line);
    }
    .card {
      border: 1.5px solid var(--soft);
      padding: 10px 12px;
      display: grid;
      gap: 6px;
      align-content: start;
      min-height: 0;
    }
    .weather-main {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .weather-icon {
      font-size: 28px;
      width: 34px;
      text-align: center;
    }
    .temp {
      font-size: 42px;
      font-weight: 800;
      line-height: 1;
    }
    .weather-sub, .note {
      font-size: 12px;
      color: var(--muted);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      font-size: 18px;
      text-align: center;
      margin-top: 4px;
    }
    .stats span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 2px;
    }
  </style>
</head>
<body>

          </div>
        </section>
      </aside>
    </div>
  </div>

    function renderTime() {
      const d = hkNow();
      document.getElementById('dateText').textContent = `${pad(d.getMonth()+1)}/${pad(d.getDate())}`;
      document.getElementById('weekdayText').textContent = weekdays[d.getDay()];

        hour: '2-digit',
        minute: '2-digit',
        hour12: false
      }).format(d);
    }
