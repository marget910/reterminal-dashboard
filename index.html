<!doctype html>
<html lang="zh-HK">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=800, initial-scale=1">
<title>reTerminal Dashboard</title>
<style>
:root{--bg:#fff;--fg:#000}
body{margin:0;background:var(--bg);color:var(--fg);font-family:Helvetica,Arial,sans-serif}
.wrapper{width:800px;height:480px;box-sizing:border-box;padding:8px}
.grid{display:grid;grid-template-columns:1.6fr 0.9fr;grid-gap:8px;height:100%}
.left{background:#fff}
.right{background:#fff;border-left:1px solid #ddd;padding:6px;display:flex;flex-direction:column;justify-content:flex-start}
.bus-table{width:100%;border-collapse:collapse;font-weight:700}
.bus-table td{padding:6px 4px;border-bottom:1px solid #eee;font-size:18px}
.bus-code{background:#000;color:#fff;padding:8px 6px;font-size:16px;width:64px;text-align:center}
.header-date{font-size:48px;font-weight:800;text-align:right}
.header-week{background:#000;color:#fff;padding:4px 6px;display:inline-block;margin-top:6px}
.time-big{font-size:34px;font-weight:700;text-align:right;margin-top:6px}
.small{font-size:12px;color:#333}
.status-box{border:1px solid #ddd;padding:6px;font-size:12px}
.weather-box{border:1px solid #ddd;padding:6px;margin-top:6px;font-size:12px}
@media (max-width:800px){.wrapper{transform:scale(0.9);transform-origin:top left}}
</style>
</head>
<body>
<div class="wrapper">
  <div class="grid">
    <div class="left">
      <table class="bus-table">
        <tr><td class="bus-code">11X</td><td>載入中</td><td>--</td></tr>
        <tr><td class="bus-code">15</td><td>載入中</td><td>--</td></tr>
        <tr><td class="bus-code">101</td><td>載入中</td><td>--</td></tr>
        <tr><td class="bus-code">93K</td><td>載入中</td><td>--</td></tr>
        <tr><td class="bus-code">215X</td><td>載入中</td><td>--</td></tr>
        <tr><td class="bus-code">14X</td><td>載入中</td><td>--</td></tr>
        <tr><td class="bus-code">A22</td><td>載入中</td><td>--</td></tr>
      </table>
    </div>
    <div class="right">
      <div style="text-align:right">
        <div class="header-date" id="dateText">--/--</div>
        <div class="header-week small" id="weekText">星期-</div>
        <div class="time-big" id="timeText">--:--:--</div>
      </div>
      <div class="weather-box" id="weatherBox">
        天氣: 載入中<br>溫度: --°C 湿度: --%
      </div>
      <div class="status-box" style="margin-top:6px" id="statusBox">STATUS: 巴士每1分 天氣每30分</div>
    </div>
  </div>
</div>
<script>
function hkNow(){return new Date(new Date().toLocaleString('en-US',{timeZone:'Asia/Hong_Kong'}));}
function pad(n){return String(n).padStart(2,'0')}
function refreshClock(){const now=hkNow();document.getElementById('dateText').textContent=pad(now.getMonth()+1)+'/'+pad(now.getDate());const wk=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];document.getElementById('weekText').textContent=wk[now.getDay()];document.getElementById('timeText').textContent=pad(now.getHours())+':'+pad(now.getMinutes())+':'+pad(now.getSeconds());}
setInterval(refreshClock,1000);refreshClock();
// Placeholder fetch functions - replace endpoints as needed
async function fetchWeather(){try{const res=await fetch('https://www.hko.gov.hk/textonly/v2/forecast/englishwx2.htm');const t=await res.text();const m=t.match(/Air Temperature\s*:\s*(\d+)/i);document.getElementById('weatherBox').textContent='天氣: 香港天文台
溫度: '+(m?m[1]:'--')+'°C';}catch(e){document.getElementById('weatherBox').textContent='天氣: 讀取失敗'}}
async function fetchBus(){/* integrate your ETA API here */}
fetchWeather();fetchBus();setInterval(fetchWeather,30*60*1000);setInterval(fetchBus,60*1000);
</script>
</body>
</html>
