<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>reTerminal bus dashboard</title>
  <style>
    :root {
      --bg: #f4f4f4;
      --fg: #111;
      --line: #111;
      --muted: #666;
      --white: #fff;
      --soft: #d8d8d8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #ddd;
      font-family: Arial, "Noto Sans TC", sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      color: var(--fg);
    }
    .frame {
      width: 800px;
      height: 480px;
      background: var(--bg);
      border: 8px solid #fff;
      box-shadow: 0 8px 30px rgba(0,0,0,.15);
      padding: 18px;
    }
    .dash {
      display: grid;
      grid-template-columns: 1.65fr .95fr;
      gap: 18px;
      height: 100%;
    }
    .bus-panel {
      display: grid;
      grid-template-rows: repeat(7, 1fr);
      border-top: 2px solid var(--line);
      border-bottom: 2px solid var(--line);
    }
    .row {
      display: grid;
      grid-template-columns: 94px 1fr 1fr 1fr;
      align-items: center;
      min-height: 0;
      border-bottom: 1px solid var(--line);
    }
    .row:last-child { border-bottom: 0; }
    .route {
      background: #111;
      color: #fff;
      font-weight: 700;
      font-size: 24px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: .3px;
    }
    .eta {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      border-left: 1px solid var(--line);
      overflow: hidden;
      white-space: nowrap;
    }
    .eta.na { color: var(--muted); }
    .side {
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 12px;
    }
    .date-box {
      text-align: center;
      padding-top: 2px;
    }
    .date {
      font-size: 72px;
      line-height: .95;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .weekday {
      display: inline-block;
      background: #111;
      color: #fff;
      padding: 6px 24px;
      font-size: 28px;
      line-height: 1;
      margin-top: 6px;
      font-weight: 700;
    }
    .clock {
      text-align: center;
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
      padding: 6px 0 10px;
      border-bottom: 2px solid var(--line);
    }
    .card {
      border: 1.5px solid var(--soft);
      padding: 10px 12px;
      display: grid;
      gap: 6px;
      align-content: start;
      min-height: 0;
    }
    .weather-main {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .weather-icon {
      font-size: 28px;
      width: 34px;
      text-align: center;
    }
    .temp {
      font-size: 42px;
      font-weight: 800;
      line-height: 1;
    }
    .weather-sub, .note {
      font-size: 12px;
      color: var(--muted);
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      font-size: 18px;
      text-align: center;
      margin-top: 4px;
    }
    .stats span {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .calendar {
      overflow: hidden;
    }
    .calendar-title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: .6px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 6px;
      margin-bottom: 2px;
    }
    .event {
      display: grid;
      grid-template-columns: 62px 1fr;
      gap: 8px;
      font-size: 15px;
      align-items: start;
      margin-bottom: 6px;
    }
    .event-time { font-weight: 700; }
  </style>
</head>
<body>
  <div class="frame">
    <div class="dash">
      <section class="bus-panel" aria-label="巴士到站時間">
        <div class="row"><div class="route">27</div><div class="eta" id="eta-27-1">載入中</div><div class="eta" id="eta-27-2">--</div><div class="eta" id="eta-27-3">--</div></div>
        <div class="row"><div class="route">1A</div><div class="eta" id="eta-1A-1">載入中</div><div class="eta" id="eta-1A-2">--</div><div class="eta" id="eta-1A-3">--</div></div>
        <div class="row"><div class="route">42</div><div class="eta" id="eta-42-1">載入中</div><div class="eta" id="eta-42-2">--</div><div class="eta" id="eta-42-3">--</div></div>
        <div class="row"><div class="route">213D</div><div class="eta" id="eta-213D-1">載入中</div><div class="eta" id="eta-213D-2">--</div><div class="eta" id="eta-213D-3">--</div></div>
        <div class="row"><div class="route">6D</div><div class="eta" id="eta-6D-1">載入中</div><div class="eta" id="eta-6D-2">--</div><div class="eta" id="eta-6D-3">--</div></div>
        <div class="row"><div class="route">296C</div><div class="eta" id="eta-296C-1">載入中</div><div class="eta" id="eta-296C-2">--</div><div class="eta" id="eta-296C-3">--</div></div>
        <div class="row"><div class="route">793</div><div class="eta" id="eta-793-1">載入中</div><div class="eta" id="eta-793-2">--</div><div class="eta" id="eta-793-3">--</div></div>
      </section>

      <aside class="side">
        <div class="date-box">
          <div class="date" id="dateText">06/23</div>
          <div class="weekday" id="weekdayText">星期二</div>
        </div>

        <div class="clock" id="clockText">21:37:55</div>

        <section class="card" aria-label="天氣資訊">
          <div class="weather-main">
            <div class="weather-icon" id="weatherIcon">☁</div>
            <div>
              <div class="temp" id="tempText">--</div>
              <div class="weather-sub" id="weatherDesc">載入中</div>
            </div>
          </div>
          <div class="stats">
            <div><span>Humidity</span><strong id="humidityText">--</strong></div>
            <div><span>Wind</span><strong id="windText">--</strong></div>
            <div><span>UV</span><strong id="uvText">--</strong></div>
          </div>
        </section>

        <section class="card calendar" aria-label="系統資訊">
          <div class="calendar-title">STATUS</div>
          <div class="event"><div class="event-time">巴士</div><div>每 1 分鐘更新</div></div>
          <div class="event"><div class="event-time">天氣</div><div>每 30 分鐘更新</div></div>
          <div class="note">此版本已移除 Google Calendar，較適合放上 GitHub Pages。</div>
        </section>
      </aside>
    </div>
  </div>

  <script>
    const BUS_CONFIG = [
      { route: '27', company: 'kmb', stop: 'WT695' },
      { route: '1A', company: 'kmb', stop: 'WT695' },
      { route: '42', company: 'kmb', stop: 'WT695' },
      { route: '213D', company: 'kmb', stop: 'WT695' },
      { route: '6D', company: 'kmb', stop: 'WT541' },
      { route: '296C', company: 'kmb', stop: 'WT302' },
      { route: '793', company: 'ctb', stop: '1829' }
    ];

    const weekdays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
    const pad = n => String(n).padStart(2, '0');
    const dateText = document.getElementById('dateText');
    const weekdayText = document.getElementById('weekdayText');
    const clockText = document.getElementById('clockText');

    function renderTime() {
      const d = new Date();
      dateText.textContent = `${pad(d.getMonth()+1)}/${pad(d.getDate())}`;
      weekdayText.textContent = weekdays[d.getDay()];
      clockText.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function minsUntil(iso) {
      const target = new Date(iso);
      const diff = Math.round((target.getTime() - Date.now()) / 60000);
      if (Number.isNaN(diff) || diff < 0) return null;
      if (diff <= 1) return '即將到站';
      return `${diff} 分鐘`;
    }

    function setEta(route, list) {
      for (let i = 1; i <= 3; i++) {
        const el = document.getElementById(`eta-${route}-${i}`);
        const value = list[i - 1] || 'N/A';
        el.textContent = value;
        el.classList.toggle('na', value === 'N/A');
      }
    }

    async function fetchKmbEta(route, stop) {
      const url = `https://data.etabus.gov.hk/v1/transport/kmb/eta/${stop}/${route}/1`;
      const res = await fetch(url);
      const json = await res.json();
      const rows = (json.data || [])
        .filter(x => x.route === route && x.eta)
        .slice(0, 3)
        .map(x => minsUntil(x.eta))
        .filter(Boolean);
      return rows;
    }

    async function fetchCtbEta(route, stopId) {
      const url = `https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/${stopId}/${route}`;
      const res = await fetch(url);
      const json = await res.json();
      const rows = (json.data || [])
        .filter(x => x.route === route && x.eta)
        .slice(0, 3)
        .map(x => minsUntil(x.eta))
        .filter(Boolean);
      return rows;
    }


    async function fetchWeather() {
      try {
        const res = await fetch('https://www.hko.gov.hk/textonly/v2/forecast/englishwx2.htm');
        const text = await res.text();
        const tempMatch = text.match(/Air Temperature :\s*(\d+) degrees Celsius/i);
        const humMatch = text.match(/Relative Humidity :\s*(\d+) per cent/i);
        const uvMatch = text.match(/UV Index recorded at King's Park :\s*([\d.]+)/i);
        const descMatch = text.match(/Weather Cartoon :\s*(.+)/i);
        document.getElementById('tempText').textContent = tempMatch ? tempMatch[1] : '--';
        document.getElementById('humidityText').textContent = humMatch ? humMatch[1] : '--';
        document.getElementById('uvText').textContent = uvMatch ? uvMatch[1] : '--';
        document.getElementById('weatherDesc').textContent = descMatch ? descMatch[1].replace(/<[^>]+>/g, '').trim() : 'Hong Kong Observatory';
        document.getElementById('weatherIcon').textContent = '☔';
        document.getElementById('windText').textContent = '--';
      } catch (e) {
        document.getElementById('weatherDesc').textContent = '天氣暫時未能載入';
      }
    }
    }

    async function refreshBusEta() {
      for (const item of BUS_CONFIG) {
        try {
          const rows = item.company === 'kmb'
            ? await fetchKmbEta(item.route, item.stop)
            : await fetchCtbEta(item.route, item.stop);
          setEta(item.route, rows.length ? rows : ['N/A', 'N/A', 'N/A']);
        } catch (err) {
          setEta(item.route, ['錯誤', '錯誤', '錯誤']);
          console.error(item.route, err);
        }
      }
    }

    renderTime();
    setInterval(renderTime, 1000);
    fetchWeather();
    refreshBusEta();
    setInterval(fetchWeather, 30 * 60 * 1000);
    setInterval(refreshBusEta, 60000);
  </script>
</body>
</html>
