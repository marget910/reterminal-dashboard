<!doctype html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>fetch test</title>
  <style>
    body { font-family: Arial, "Noto Sans TC", sans-serif; margin: 0; padding: 16px; background: #f4f4f4; color: #111; }
    .box { max-width: 760px; margin: 0 auto; background: #fff; border: 1px solid #ddd; padding: 16px; }
    .row { margin: 8px 0; }
    pre { white-space: pre-wrap; word-break: break-word; background: #111; color: #0f0; padding: 12px; min-height: 180px; }
    .ok { color: #0a7a0a; }
    .err { color: #b00020; }
  </style>
</head>
<body>
  <div class="box">
    <div class="row"><strong>Clock:</strong> <span id="clock">--:--:--</span></div>
    <div class="row"><strong>Bus:</strong> <span id="bus">waiting...</span></div>
    <div class="row"><strong>Weather:</strong> <span id="weather">waiting...</span></div>
    <div class="row"><strong>Status:</strong> <span id="status">ready</span></div>
    <pre id="log">log...</pre>
  </div>

  <script>
    const log = (msg) => { document.getElementById('log').textContent += '\n' + msg; };
    const set = (id, v) => { document.getElementById(id).textContent = v; };
    const hkNow = () => new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Hong_Kong' }));
    const pad = n => String(n).padStart(2, '0');

    function tick() {
      const d = hkNow();
      set('clock', `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`);
    }

    async function testWeather() {
      try {
        const r = await fetch('https://data.weather.gov.hk/weatherAPI/opendata/weather.php?dataType=rhrread&lang=en');
        set('weather', `HTTP ${r.status}`);
        const j = await r.json();
        log('weather ok');
        log(JSON.stringify({ temp: j.temperature?.data?.[0], humidity: j.humidity?.data?.[0], uv: j.uvindex?.data?.[0] }, null, 2));
      } catch (e) {
        set('weather', `ERROR ${e.message}`);
        log('weather error: ' + (e.stack || e.message));
      }
    }

    async function testBus() {
      try {
        const url = 'https://data.etabus.gov.hk/v1/transport/kmb/eta/D625B0997C3DBCFE/27/1';
        const r = await fetch(url);
        set('bus', `HTTP ${r.status}`);
        const j = await r.json();
        log('bus ok');
        log(JSON.stringify(j?.data?.slice?.(0,2) || j, null, 2));
      } catch (e) {
        set('bus', `ERROR ${e.message}`);
        log('bus error: ' + (e.stack || e.message));
      }
    }

    tick();
    testWeather();
    testBus();
    setInterval(tick, 1000);
    set('status', 'loaded');
  </script>
</body>
</html>
